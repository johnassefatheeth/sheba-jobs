# Hourly website scrape.
#
# GitHub `schedule` can be delayed or skipped (especially at :00 UTC on private repos).
# Cron is set to :17 past each hour to reduce queue drops.
#
# Repo secrets (Settings → Secrets → Actions):
#   DATABASE_URL (required)
#   TELEGRAM_BOT_TOKEN, TELEGRAM_BOT_CHANNEL_ID (for Telegram posts)
#
# If scheduled runs never appear (only "Manually run by"), use the backup trigger:
#   https://cron-job.org — POST every hour to workflow_dispatch (see README).
name: Website scrape

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: website-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install and build db package
        working-directory: packages/db
        run: |
          npm install
          npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Run website scraper
        working-directory: apps/scraper
        run: |
          npm install
          npm run start:website
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          WEBSITE_JOBS_PROVIDER: all
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_BOT_CHANNEL_ID: ${{ secrets.TELEGRAM_BOT_CHANNEL_ID }}
          NEXT_PUBLIC_SITE_URL: https://jobs.sheba-labs.com
