# Website scrape — triggered by cron-job.org (schedule lives there, not here).
#
# cron-job.org: POST workflow_dispatch (same URL + GitHub PAT for every job).
#   https://api.github.com/repos/johnassefatheeth/sheba-jobs/actions/workflows/website-scrape.yml/dispatches
#   Body: {"ref":"main"}
#   Headers: Accept application/vnd.github+json, Authorization Bearer <PAT>, X-GitHub-Api-Version 2022-11-28
#
# All times below are Ethiopia (EAT = UTC+3). cron-job.org uses UTC.
#
# --- Mon–Fri day (every 25 min, 08:00–16:45 EAT) ---
#   Weekdays: MON–FRI
#   Minutes UTC: 0,5,10,15,20,25,30,35,40,45,50,55
#   Hours UTC: 5–12 (all), plus hour 13 minutes 0,25,45 (16:00, 16:25, 16:45 EAT)
#
# --- Sat–Sun day (every 2 h, 08:00–16:00 EAT) ---
#   Weekdays: SAT–SUN
#   Minutes: 0
#   Hours UTC: 5,7,9,11,13
#
# --- Every night (every 3.5 h) ---
#   Weekdays: all days
#   UTC: 14:00, 17:30, 21:00, 00:30, 04:00  →  17:00, 20:30, 00:00, 03:30, 07:00 EAT
#
# ~155 runs/week (~22/day avg) × ~3 min ≈ under 2,000 Actions min/month on private repos.
#
# Secrets: DATABASE_URL, TELEGRAM_BOT_TOKEN, TELEGRAM_BOT_CHANNEL_ID
name: Website scrape

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: website-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install and build db package
        working-directory: packages/db
        run: |
          npm install
          npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Run website scraper
        working-directory: apps/scraper
        run: |
          npm install
          npm run start:website
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          WEBSITE_JOBS_PROVIDER: all
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_BOT_CHANNEL_ID: ${{ secrets.TELEGRAM_BOT_CHANNEL_ID }}
          NEXT_PUBLIC_SITE_URL: https://jobs.sheba-labs.com
